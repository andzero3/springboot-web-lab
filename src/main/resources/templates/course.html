<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课程列表</title>
    <style>
        body { font-family: "Microsoft YaHei", system-ui, sans-serif; background: #fff; margin:0; padding: 30px; }
        h2 { color: #000; text-align: center; font-weight: 500; margin-bottom: 20px; }
        table { width: 100%; max-width: 960px; margin: 0 auto; border-collapse: collapse; }
        th { background: #fff; color: #000; padding: 10px 12px; text-align: left; font-size: 13px; font-weight: 500; border-bottom: 2px solid #000; }
        td { padding: 10px 12px; border-bottom: 1px solid #000; font-size: 13px; color: #000; }
        tr:hover { background: #fff; }
        .highlight { color: #e00; font-weight: 500; }
        .count { text-align: center; color: #000; font-size: 12px; margin-top: 12px; }
    </style>
</head>
<body>
<h2>课程列表</h2>
<table>
    <tr>
        <th>ID</th>
        <th>课程名</th>
        <th>课程编号</th>
        <th>任课老师</th>
        <th>班级</th>
        <th>上课日期</th>
        <th>节次</th>
    </tr>
    <tr th:each="c : ${courses}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.courseName}"></td>
        <td><span class="highlight" th:if="${c.teacherName == '林家贤'}" th:text="${c.courseNo}"></span><span th:unless="${c.teacherName == '林家贤'}" th:text="${c.courseNo}"></span></td>
        <td><span class="highlight" th:if="${c.teacherName == '林家贤'}" th:text="${c.teacherName}"></span><span th:unless="${c.teacherName == '林家贤'}" th:text="${c.teacherName}"></span></td>
        <td th:text="${c.className}"></td>
        <td th:text="${c.courseDay}"></td>
        <td th:text="${c.coursePeriod}"></td>
    </tr>
</table>
<div class="count" th:text="'共 ' + ${courses.size()} + ' 条记录'"></div>
</body>
</html>
